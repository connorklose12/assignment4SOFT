<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title mb-4">Edit Expense</h2>
          <form (ngSubmit)="updateExpense()">
            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input
                type="text"
                class="form-control"
                id="title"
                [(ngModel)]="title"
                name="title"
                placeholder="Enter expense title"
                required
              />
            </div>

            <div class="mb-3">
              <label for="amount" class="form-label">Amount ($)</label>
              <input
                type="number"
                class="form-control"
                id="amount"
                [(ngModel)]="amount"
                name="amount"
                placeholder="Enter amount"
                step="0.01"
                required
              />
            </div>

            <div class="mb-3">
              <label for="category" class="form-label">Category</label>
              <select
                class="form-select"
                id="category"
                [(ngModel)]="category"
                name="category"
              >
                <option *ngFor="let cat of categories()" [value]="cat">
                  {{ cat }}
                </option>
              </select>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1">
                Update Expense
              </button>
              <button
                type="button"
                class="btn btn-secondary"
                (click)="cancel()"
              >
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
