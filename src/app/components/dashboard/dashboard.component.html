<div class="container mt-4">
  <h1 class="mb-4">Dashboard</h1>
  <div class="row">
    <div class="col-md-6 mb-3">
      <div class="card bg-primary text-white">
        <div class="card-body">
          <h5 class="card-title">Total Expenses</h5>
          <p class="card-text fs-4">${{ totalExpense().toFixed(2) }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-6 mb-3">
      <div class="card bg-success text-white">
        <div class="card-body">
          <h5 class="card-title">Number of Expenses</h5>
          <p class="card-text fs-4">{{ transactionCount() }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-6 mb-3">
      <div class="card bg-warning text-white">
        <div class="card-body">
          <h5 class="card-title">Highest Expense</h5>
          <p class="card-text fs-4">${{ highestExpense().toFixed(2) }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-6 mb-3">
      <div class="card bg-info text-white">
        <div class="card-body">
          <h5 class="card-title">Average Expense</h5>
          <p class="card-text fs-4">${{ averageExpense().toFixed(2) }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
