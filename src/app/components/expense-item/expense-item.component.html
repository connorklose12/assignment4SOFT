<div class="card" [class.high-expense]="isHighExpense()">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <div>
        <h5 class="card-title mb-1">{{ expense.title }}</h5>
        <span
          class="badge"
          [ngClass]="'bg-' + getCategoryColor()"
        >
          {{ expense.category }}
        </span>
      </div>
      <h4 [ngClass]="{ 'text-danger': isHighExpense() }">
        ${{ expense.amount.toFixed(2) }}
      </h4>
    </div>
    <div class="d-flex gap-2 mt-3">
      <button
        type="button"
        class="btn btn-sm btn-warning"
        (click)="onEdit()"
      >
        Edit
      </button>
      <button
        type="button"
        class="btn btn-sm btn-danger"
        (click)="onDelete()"
      >
        Delete
      </button>
    </div>
  </div>
</div>
